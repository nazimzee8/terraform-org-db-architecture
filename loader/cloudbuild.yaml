steps:
  # Step 1 - Build multi-stage image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '--no-cache'
      - '-t'
      - '$_IMAGE_URI:${_TAG}'
      - '-f'
      - 'loader/Dockerfile'
      - 'loader'
    waitFor: ['-']

  # Step 2 - Push the chosen build tag
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args: ['push', '$_IMAGE_URI:${_TAG}']
    waitFor: ['build']

  # Step 3 - Optional deploy. Default is disabled so image builds are decoupled
  # from Cloud Run job existence and iam.serviceAccountUser requirements.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: bash
    args:
      - -c
      - |
        if [[ "${_DEPLOY}" != "true" ]]; then
          echo "Skipping Cloud Run job deploy because _DEPLOY=${_DEPLOY}."
          exit 0
        fi
        gcloud run jobs update "${_JOB_NAME}" \
          --image="${_IMAGE_URI}:${_TAG}" \
          --region="${_REGION}"
    waitFor: ['push']

substitutions:
  _DEPLOY: 'false'
  _TAG: 'manual'
  _IMAGE_URI: 'us-west2-docker.pkg.dev/nazimz-database/loader-docker-img/loader'
  _REGION: 'us-west2'
  _JOB_NAME: 'monthly-loader-job'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
