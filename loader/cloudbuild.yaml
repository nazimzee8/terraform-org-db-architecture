steps:
  # Step 1 — Build multi-stage image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '--no-cache'
      - '-t'
      - '$_IMAGE_URI:${_TAG}'
      - '-t'
      - '$_IMAGE_URI:latest'
      - '-f'
      - 'loader/Dockerfile'
      - 'loader'
    waitFor: ['-']

  # Step 2 — Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args: ['push', '--all-tags', '$_IMAGE_URI']
    waitFor: ['build']

  # Step 3 — Update Cloud Run job image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - 'monthly-loader-job'
      - '--image=$_IMAGE_URI:${_TAG}'
      - '--region=$_REGION'
    waitFor: ['push']

substitutions:
  _TAG: 'latest'
  _IMAGE_URI: 'us-west2-docker.pkg.dev/nazimz-database/loader-docker-img/loader'
  _REGION: 'us-west2'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
