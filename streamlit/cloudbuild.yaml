steps:
  # Step 1 - Build multi-stage image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '--no-cache'
      - '-t'
      - '$_IMAGE_URI:${_TAG}'
      - '-f'
      - 'streamlit/Dockerfile'
      - 'streamlit'
    waitFor: ['-']

  # Step 2 - Push the immutable tag chosen for this build
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args: ['push', '$_IMAGE_URI:${_TAG}']
    waitFor: ['build']

  # Step 3 - Optional deploy. Default is disabled so image builds are decoupled
  # from Cloud Run readiness and service-account bindings.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: bash
    args:
      - -c
      - |
        if [[ "${_DEPLOY}" != "true" ]]; then
          echo "Skipping Cloud Run deploy because _DEPLOY=${_DEPLOY}."
          exit 0
        fi
        gcloud run services update "${_SERVICE_NAME}" \
          --image="${_IMAGE_URI}:${_TAG}" \
          --region="${_REGION}" \
          --min-instances=1 \
          --cpu-boost \
          --no-cpu-throttling
    waitFor: ['push']

substitutions:
  _DEPLOY: 'false'
  _TAG: 'manual'
  _IMAGE_URI: 'us-west2-docker.pkg.dev/nazimz-database/streamlit-docker-img/streamlit'
  _REGION: 'us-west2'
  _SERVICE_NAME: 'streamlit-app-service'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
